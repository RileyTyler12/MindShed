<h1>To-do List</h1>
<input class="ui-input" type="text" id="todo-input" name="todo-input">
<button class="btn-primary" id="addTodoButton" onclick="addTodoListItem()">Add</button>
<div id="todoList-main-container">
    <div class="todoList-section-container">
        <h2 style="color: red">To-Do</h2>
        <div id="list-incomplete">
            <p>Nothing here yet...</p>
        </div>
    </div>
    <div class="todoList-section-container">
        <h2 style="color: green">Done</h2>
        <div id="list-complete">
            <p>Nothing here yet...</p>
        </div>
    </div>
</div>
