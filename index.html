<!DOCTYPE html>
<html lang="en" id="html-element">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="manifest" href="site.webmanifest">
    <link rel="stylesheet" type="text/css" href="styles/styles.css">
    <title>MindShed</title>
</head>
<body>
    <div class="container">
        <header>
            <h1>🧠MindShed🛖</h1>
            <p id="randomTagline"></p>
            <script>
                //Display a random tagline on page load.
                let tagElement = document.getElementById("randomTagline");
                let taglines = ["Your place to think it out.", "Here to help your mind.", "The little shed of thought."]
                let randomNum = Math.floor(Math.random() * (Math.floor(taglines.length) - Math.ceil(0)) + Math.ceil(0)); //Get random integer between 0 and the length of taglines[]
                console.log("Random Tagline Num: " + randomNum);

                tagElement.textContent = taglines[randomNum];
            </script>
            <div class="ui-card" id="streak-panel">
                <div>
                    <h2 id="streak">❄️</h2>
                </div>
                <div>
                    <p id="me-points" style="color: gold">0</p>
                </div>
            </div>
            <script>
                //Toggle theme dropdown visibility
                function toggleThemeDropdown() {
                    let dropdown = document.getElementById("theme-dropdown-container");
                    if (dropdown.classList.contains("hidden")) {
                        dropdown.classList.toggle("hidden");
                    }
                    else {
                        dropdown.classList.toggle("hidden");
                    }
                }
            </script>
            <button class="btn-secondary" id="theme-button" onclick="toggleThemeDropdown()">🌚</button>
            <div id="theme-dropdown-container" class="ui-card theme-dropdown hidden" style="display: block;">
                <button class="btn-secondary theme-dropdown-item" onclick="setTheme('dark'); toggleThemeDropdown()">🌚 Dark</button>
                <button class="btn-secondary theme-dropdown-item" onclick="setTheme('light'); toggleThemeDropdown()">🌞 Light</button>
                <button class="btn-secondary theme-dropdown-item" onclick="setTheme('retro'); toggleThemeDropdown()">🎬 Retro</button>
                <button class="btn-secondary theme-dropdown-item" onclick="setTheme('mint'); toggleThemeDropdown()">🍃 Mint</button>
                <button class="btn-secondary theme-dropdown-item" onclick="setTheme('cute'); toggleThemeDropdown()">🌸 Cute</button>
                <button class="btn-secondary theme-dropdown-item" onclick="setTheme('starry'); toggleThemeDropdown()">🌌 Starry</button>
                <button class="btn-secondary theme-dropdown-item" onclick="setTheme('icy'); toggleThemeDropdown()">❄️ Icy</button>
                <button class="btn-secondary theme-dropdown-item" onclick="setTheme('fire'); toggleThemeDropdown()">🔥 Fire/Lava</button>
            </div>
        </header>

        <div id="notification-container"></div>

        <div id="navMenu-container">
            <nav id="navbar" class="ui-card">
                <div id="main-nav-buttons">
                    <script defer type="module" src="scripts/contentSwitcher.js"></script>

                    <button class="btn-secondary" id="welcome-button" onclick="changeContent('welcome'), toggleNavbar()">Welcome</button>
                    <script>
                        //If user has done onboarding, show the other button options.
                        if (localStorage.getItem("mindshed-userInfo") !== null) {
                            document.getElementById("main-nav-buttons").innerHTML += "<button class=\"btn-secondary\" id=\"todoList-button\" onclick=\"changeContent('todoList'), toggleNavbar()\">To-Do List</button><button class=\"btn-secondary\" id=\"journal-button\" onclick=\"changeContent('journal'), toggleNavbar()\">Journal</button>"
                        }

                        //Function to toggle nav bar
                        function toggleNavbar() {
                            if (document.getElementById("navbar").classList.contains("slide-out-top")) {
                                document.getElementById("navbar").classList.toggle("slide-in-top");
                                document.getElementById("navbar").classList.toggle("slide-out-top")
                            }
                            else {
                                if (document.getElementById("navbar").classList.contains("slide-in-top")) {
                                    document.getElementById("navbar").classList.toggle("slide-in-top");
                                }
                                document.getElementById("navbar").classList.toggle("slide-out-top");
                            }
                            document.getElementById("navbar-button").disabled = false;
                        }

                    </script>
                    <button class="btn-secondary" id="about-button" onclick="changeContent('about'), toggleNavbar()">About</button>
                </div>
            </nav>
            <button class="btn-secondary" id="navbar-button" onclick="toggleNavbar()">☰</button>
            <script>
                //Play starting navbar anim
                let initalNavToggleTimer = setTimeout(toggleNavbar, 2000); //Creates a timer to call toggleNavbar() for inital nav menu anim
                document.getElementById("navbar-button").disabled = true; //Prevent user from toggling button just yet.
            </script>
        </div>
        <br>

        <main>
            <div class="ui-card" id="main-container">
            </div>
        </main>
        <br>

        <footer>
            <p>©️ ReopDev 2026</p>
            <p id="version">0.4.0</p>
            <script>
                // As of version 0.3.0, big feature changes such as userSettings and userInfo have been implemented. From now on, version string will be saved to local storage. As a patch, any saved information before the update will be deleted.
                if (localStorage.getItem("mindshed-version") === null) {
                    for (let i = localStorage.length - 1; i >= 0; i--) {
                        const key = localStorage.key(i);
                        if (key && key.startsWith('mindshed-')) {
                            localStorage.removeItem(key);
                        }
                    }
                    location.reload();
                }
                let version = document.getElementById("version").textContent;
                localStorage.setItem("mindshed-version", version);
            </script>
        </footer>
    </div>
</body>
</html>
